name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: amymis_test
          POSTGRES_USER: amymis
          POSTGRES_PASSWORD: amymis_test
        options: >-
          --health-cmd "pg_isready -U amymis -d amymis_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        working-directory: backend
        run: go mod download

      - name: Vet
        working-directory: backend
        run: go vet ./...

      - name: Test with race detector
        working-directory: backend
        run: go test ./... -race -count=1 -coverprofile=coverage.out
        env:
          DATABASE_URL: postgres://amymis:amymis_test@localhost:5432/amymis_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-key-that-is-at-least-32-chars
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: test-bucket
          ENVIRONMENT: development

      - name: Build binary
        working-directory: backend
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/amy-mis cmd/server/main.go

      - name: Upload coverage
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.out

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: backend
        run: docker build -t amy-mis:${{ github.sha }} .

      - name: Verify Docker image
        run: docker run --rm amy-mis:${{ github.sha }} --help || true
